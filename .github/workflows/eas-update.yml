name: Publish EAS Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: npx eas update --auto --branch production --non-interactive
